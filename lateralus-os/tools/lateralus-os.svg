<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#11111b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#89b4fa"/>
      <stop offset="50%" stop-color="#cba6f7"/>
      <stop offset="100%" stop-color="#f38ba8"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="22" fill="url(#bg)" stroke="url(#ring)" stroke-width="3"/>
  <!-- stylised L + sideways lattice = "lateralus" -->
  <g fill="none" stroke="url(#ring)" stroke-width="5" stroke-linecap="round">
    <path d="M34 32 L34 96 L74 96"/>
    <path d="M54 60 L94 60"/>
    <path d="M64 48 L94 48"/>
    <path d="M64 72 L94 72"/>
  </g>
  <circle cx="94" cy="60" r="4" fill="#a6e3a1"/>
  <text x="64" y="116" text-anchor="middle" font-family="monospace" font-size="11"
        fill="#cdd6f4" font-weight="bold">LateralusOS</text>
</svg>
