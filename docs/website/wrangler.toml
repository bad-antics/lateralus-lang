name = "lateralus-dev"
compatibility_date = "2024-09-23"

# Cloudflare Pages project
# account_id is auto-detected from the wrangler auth token (Pages does not
# accept account_id in the config file; Workers do)
pages_build_output_dir = "."

# R2 bucket binding for ISO downloads
[[r2_buckets]]
binding = "DOWNLOADS"
bucket_name = "lateralus-downloads"
# Custom domain: downloads.lateralus.dev → lateralus-downloads R2 bucket

# =============================================================================
# To upload ISOs to the R2 bucket:
#
#   npx wrangler r2 object put lateralus-downloads/<filename>.iso \
#     --file <path/to/file.iso> \
#     --content-type application/octet-stream
#
# Example:
#   npx wrangler r2 object put lateralus-downloads/lateralus-os-research-x86_64.iso \
#     --file lateralus-os/build/lateralus-os.iso \
#     --content-type application/octet-stream
#
# Objects in the bucket are publicly accessible at:
#   https://downloads.lateralus.dev/<filename>
#
# Current bucket contents (all verified present as of April 2026):
#   LateralusOS editions:
#     lateralus-os-research-x86_64.iso
#     lateralus-os-workstation-x86_64.iso
#     lateralus-os-industrial-x86_64.iso
#     lateralus-os-embedded-x86_64.iso
#     lateralus-os-cloud-x86_64.iso
#     lateralus-os-developer-x86_64.iso
#   NullSec Linux:
#     nullsec-linux-desktop-2.1.0-x86_64.iso
#     nullsec-linux-server-2.1.0-x86_64.iso
#     nullsec-linux-arm64-2.1.0-aarch64.iso
# =============================================================================
