name = "lateralus-downloads-worker"
main = "worker.js"
compatibility_date = "2024-09-23"

# R2 bucket binding — same bucket as main site
[[r2_buckets]]
binding = "DOWNLOADS"
bucket_name = "lateralus-downloads"

# Serve at downloads.lateralus.dev
[[routes]]
pattern = "downloads.lateralus.dev/*"
zone_name = "lateralus.dev"
