# github-linguist/linguist heuristics entry
#
# Not required at this time: the `.ltl` extension is not currently
# claimed by any other language in Linguist's languages.yml, so
# disambiguation heuristics are unnecessary.
#
# If a future conflict arises (e.g. "Little Language" ever ships with
# `.ltl`), the heuristics below demonstrate what we would add.
#
#   - extensions: ['.ltl']
#     rules:
#       - language: Lateralus
#         pattern: '^(pub\s+)?fn\s+\w+.*\|>'                  # pipeline-using fn decl
#       - language: Lateralus
#         pattern: '^import\s+[a-z][a-z_]*::'                  # `::` module path
#       - language: Lateralus
#         pattern: '^\#\[caps(?:_sealed)?\('                   # capability effect decorator
#
# Included here only for future reference.
