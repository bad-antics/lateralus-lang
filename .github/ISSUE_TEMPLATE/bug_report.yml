name: Bug Report
description: Report a bug in the Lateralus compiler, VM, or toolchain
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix it.
  - type: input
    id: version
    attributes:
      label: Lateralus version
      description: "Run `lateralus --version` and paste the output"
      placeholder: "lateralus-lang 3.0.1"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Run `python --version` and paste the output"
      placeholder: "Python 3.12.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Lateralus is affected?
      options:
        - Compiler / Parser
        - Virtual Machine (VM)
        - Standard Library
        - REPL
        - Formatter / Linter
        - Code Generation (C / WASM / JS)
        - VS Code Extension / LSP
        - PyPI Package
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what the bug is
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction code
      description: Minimal `.ltl` code that triggers the bug
      render: lateralus
      placeholder: |
        fn main() {
            // paste minimal reproduction here
        }
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened (include full error output)
      render: shell
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or logs
    validations:
      required: false
