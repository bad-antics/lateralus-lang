# seed-repos/manifest.yml
#
# Declarative spec for the 30 satellite Lateralus repositories.
# Consumed by `generate.py` to materialise `staged/{name}/` trees
# and by `publish.sh` to push them to GitHub.
#
# Each repo is intentionally small (100-400 LoC) and self-contained.

owner: bad-antics
license: MIT

defaults:
  version: "0.1.0"
  language: Lateralus
  topics: [lateralus, lateralus-lang, ltl]
  branch: main

repos:

  # -- CLI utilities ----------------------------------------------------------

  - name: ltl-json-cli
    tagline: Streaming JSON pretty-printer and query CLI in pure Lateralus.
    category: cli-utility
    source_template: json_cli
    topics: [json, cli, pretty-print]

  - name: ltl-csv-tools
    tagline: CSV filter, transform, and aggregate CLI — sed for tabular data.
    category: cli-utility
    source_template: csv_tools
    topics: [csv, cli, etl]

  - name: ltl-hash-cat
    tagline: Multi-algorithm file hasher (SHA-2, SHA-3, Blake2, Blake3).
    category: cli-utility
    source_template: hash_cat
    topics: [hash, cli, crypto]

  - name: ltl-http-bench
    tagline: Minimal HTTP load tester with percentile latency reporting.
    category: cli-utility
    source_template: http_bench
    topics: [http, benchmark, networking]

  - name: ltl-uuid-gen
    tagline: UUID v1/v4/v7 generator + parser with RFC 4122 validation.
    category: cli-utility
    source_template: uuid_gen
    topics: [uuid, cli]

  - name: ltl-port-scanner
    tagline: Connect-scan TCP port sweeper with banner grabbing.
    category: cli-utility
    source_template: port_scanner
    topics: [networking, security, scanner]

  - name: ltl-passwd-gen
    tagline: Cryptographically secure password and passphrase generator.
    category: cli-utility
    source_template: passwd_gen
    topics: [passwords, crypto, cli]

  - name: ltl-dns-dig
    tagline: Recursive DNS resolver client (A, AAAA, MX, TXT, SRV).
    category: cli-utility
    source_template: dns_dig
    topics: [dns, networking, cli]

  # -- Algorithms / data structures ------------------------------------------

  - name: ltl-graph-algos
    tagline: BFS, DFS, Dijkstra, A*, and Bellman-Ford on a common graph API.
    category: algorithms
    source_template: graph_algos
    topics: [graphs, algorithms]

  - name: ltl-heap-priq
    tagline: d-ary heap priority queue with decrease-key support.
    category: algorithms
    source_template: heap_priq
    topics: [data-structures, heap]

  - name: ltl-rbtree
    tagline: Red-black tree with iterator, range scan, and persistence.
