[package]
name = "wasm-template"
version = "0.1.0"
description = "Starter template for a Lateralus WebAssembly module"
license = "MIT"
edition = "2026"

[bin]
name = "wasm-template"
path = "main.ltl"

[build]
target = "wasm32"

[wasm]
exports = ["add", "fibonacci", "mandelbrot", "alloc", "free", "sum_bytes"]
