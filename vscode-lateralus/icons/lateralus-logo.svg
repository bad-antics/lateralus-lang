<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="spiralGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="24" fill="url(#bgGrad)"/>

  <!-- Outer glow ring -->
  <circle cx="64" cy="60" r="42" fill="none" stroke="#c084fc" stroke-width="0.5" opacity="0.2"/>

  <!-- Main spiral (Fibonacci-inspired, outward) -->
  <path d="
    M64 44
    C54 44, 44 54, 44 64
    C44 76, 54 86, 66 86
    C78 86, 86 76, 86 65
    C86 55, 78 48, 69 48
    C61 48, 55 54, 55 62
    C55 69, 60 74, 66 74
    C71 74, 75 70, 75 66
    C75 62, 72 59, 68 59
    C65 59, 63 61, 63 64
    C63 66, 64.5 67, 66 67
  " fill="none" stroke="url(#spiralGrad)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Pipeline arrow (|>) -->
  <path d="M90 64 L108 64" stroke="url(#arrowGrad)" stroke-width="3" stroke-linecap="round"/>
  <path d="M104 58 L110 64 L104 70" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Input dot -->
  <circle cx="22" cy="64" r="4" fill="#c084fc" opacity="0.6"/>
  <circle cx="22" cy="64" r="2" fill="#c084fc"/>

  <!-- Decorative data flow dots -->
  <circle cx="30" cy="64" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="36" cy="60" r="1" fill="#818cf8" opacity="0.4"/>

  <!-- Version badge area -->
  <rect x="30" y="98" width="68" height="18" rx="9" fill="#c084fc" opacity="0.15"/>
  <text x="64" y="111" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#c084fc" letter-spacing="1">LATERALUS</text>
</svg>
