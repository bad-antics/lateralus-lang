name: Feature Request
description: Suggest a new feature or improvement for Lateralus
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We love hearing how Lateralus can be improved.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this feature relate to?
      options:
        - Language Syntax
        - Standard Library
        - Compiler / Parser
        - Virtual Machine (VM)
        - Pipeline Operator
        - Async / Concurrency
        - Type System
        - REPL
        - Formatter / Linter
        - Code Generation
        - VS Code Extension / LSP
        - Package Manager
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: "I'm trying to do X but currently have to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like and how it would work
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Code examples
      description: Show what the feature would look like in Lateralus code
      render: lateralus
      placeholder: |
        // How the feature would be used
        fn example() {
            // ...
        }
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative approaches?
    validations:
      required: false
  - type: dropdown
    id: breaking
    attributes:
      label: Is this a breaking change?
      options:
        - "No"
        - "Yes"
        - "Not sure"
    validations:
      required: true
