name: Publish to Open VSX

# Mirrors the VS Code extension to the Open VSX registry
# (covers VSCodium, Cursor, Gitpod, code-server users).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Tag or version to publish"
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-lateralus
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install vsce + ovsx
        run: npm install --no-save @vscode/vsce ovsx

      - name: Package VSIX
        run: npx vsce package --no-dependencies --out lateralus-lang.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish lateralus-lang.vsix -p "$OVSX_PAT"
