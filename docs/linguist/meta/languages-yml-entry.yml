# Proposed entry for github/linguist `lib/linguist/languages.yml`
#
# Insert alphabetically (between "Lasso" and "Latte"). Lateralus is a
# general-purpose, statically typed, pipeline-oriented programming
# language. File extension `.ltl`. TextMate grammar lives at
# github.com/bad-antics/lateralus-grammar (submoduled by Linguist under
# vendor/grammars/lateralus-grammar, contributing `source.ltl`).
#
# Color picked to match the official lateralus.dev palette (electric
# pink on near-black). Passes WCAG AA contrast against white and black.

Lateralus:
  type: programming
  color: "#FF2A6D"
  extensions:
    - ".ltl"
  aliases:
    - lateralus-lang
  tm_scope: source.ltl
  ace_mode: text
  codemirror_mode: null
  codemirror_mime_type: null
  language_id: 1048000        # placeholder — Linguist assigns on merge
