<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#1e1e2e"/>
  <!-- Notebook body -->
  <rect x="8" y="6" width="16" height="20" rx="2" fill="none" stroke="#67e8f9" stroke-width="1.3"/>
  <!-- Binding rings -->
  <line x1="6" y1="10" x2="10" y2="10" stroke="#67e8f9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="14" x2="10" y2="14" stroke="#67e8f9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="18" x2="10" y2="18" stroke="#67e8f9" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="22" x2="10" y2="22" stroke="#67e8f9" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Cell dividers -->
  <line x1="10" y1="13" x2="22" y2="13" stroke="#67e8f9" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.5"/>
  <line x1="10" y1="19" x2="22" y2="19" stroke="#67e8f9" stroke-width="0.8" stroke-dasharray="2,1" opacity="0.5"/>
  <!-- Code cell indicator -->
  <path d="M12.5 9 L14.5 10.5 L12.5 12" fill="none" stroke="#c084fc" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Mini spiral in middle cell -->
  <path d="M16 15 C15 15, 14.3 15.7, 14.3 16.5 C14.3 17.3, 15 18, 16 18 C16.7 18, 17.2 17.5, 17.2 16.8 C17.2 16.3, 16.8 16, 16.4 16" fill="none" stroke="#c084fc" stroke-width="1" stroke-linecap="round"/>
  <!-- Text lines in bottom cell -->
  <line x1="12" y1="21" x2="20" y2="21" stroke="#67e8f9" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="23" x2="17" y2="23" stroke="#67e8f9" stroke-width="0.8" opacity="0.6"/>
</svg>
