# seed-repos/manifest.yml
#
# Declarative spec for the 30 satellite Lateralus repositories.
# Consumed by `generate.py` to materialise `staged/{name}/` trees
# and by `publish.sh` to push them to GitHub.
#
# Each repo is intentionally small (100-400 LoC) and self-contained.

owner: bad-antics
license: MIT

defaults:
  version: "0.1.0"
  language: Lateralus
  topics: [lateralus, lateralus-lang, ltl]
  branch: main

repos:

  # -- CLI utilities ----------------------------------------------------------

  - name: ltl-json-cli
    tagline: Streaming JSON pretty-printer and query CLI in pure Lateralus.
    category: cli-utility
    source_template: json_cli
    topics: [json, cli, pretty-print]

  - name: ltl-csv-tools
    tagline: CSV filter, transform, and aggregate CLI — sed for tabular data.
    category: cli-utility
    source_template: csv_tools
    topics: [csv, cli, etl]

  - name: ltl-hash-cat
    tagline: Multi-algorithm file hasher (SHA-2, SHA-3, Blake2, Blake3).
    category: cli-utility
    source_template: hash_cat
    topics: [hash, cli, crypto]

  - name: ltl-http-bench
    tagline: Minimal HTTP load tester with percentile latency reporting.
    category: cli-utility
    source_template: http_bench
    topics: [http, benchmark, networking]

  - name: ltl-uuid-gen
    tagline: UUID v1/v4/v7 generator + parser with RFC 4122 validation.
    category: cli-utility
    source_template: uuid_gen
    topics: [uuid, cli]

  - name: ltl-port-scanner
    tagline: Connect-scan TCP port sweeper with banner grabbing.
    category: cli-utility
    source_template: port_scanner
    topics: [networking, security, scanner]

  - name: ltl-passwd-gen
    tagline: Cryptographically secure password and passphrase generator.
    category: cli-utility
    source_template: passwd_gen
    topics: [passwords, crypto, cli]

  - name: ltl-dns-dig
    tagline: Recursive DNS resolver client (A, AAAA, MX, TXT, SRV).
    category: cli-utility
    source_template: dns_dig
    topics: [dns, networking, cli]

  # -- Algorithms / data structures ------------------------------------------

  - name: ltl-graph-algos
    tagline: BFS, DFS, Dijkstra, A*, and Bellman-Ford on a common graph API.
    category: algorithms
    source_template: graph_algos
    topics: [graphs, algorithms]

  - name: ltl-heap-priq
    tagline: d-ary heap priority queue with decrease-key support.
    category: algorithms
    source_template: heap_priq
    topics: [data-structures, heap]

  - name: ltl-rbtree
    tagline: Red-black tree with iterator, range scan, and persistence.
    category: algorithms
    source_template: rbtree
    topics: [data-structures, rbtree]

  - name: ltl-skiplist
    tagline: Probabilistic skip list — concurrent-read friendly ordered map.
    category: algorithms
    source_template: skiplist
    topics: [data-structures, skiplist]

  - name: ltl-suffix-array
    tagline: SA-IS suffix array construction + LCP array + string-search.
    category: algorithms
    source_template: suffix_array
    topics: [strings, algorithms]

  - name: ltl-lsm-tree
    tagline: Log-structured merge tree — the core of a write-optimised KV store.
    category: algorithms
    source_template: lsm_tree
    topics: [databases, data-structures]

  # -- Protocol parsers / clients --------------------------------------------

  - name: ltl-toml-parser
    tagline: TOML 1.0 parser with pretty printer and type-safe accessors.
    category: protocol
    source_template: toml_parser
    topics: [toml, parser, config]

  - name: ltl-ini-parser
    tagline: INI-file parser with typed accessors and round-trip preservation.
    category: protocol
    source_template: ini_parser
    topics: [ini, parser, config]

  - name: ltl-yaml-lite
    tagline: Minimal YAML 1.2 subset — scalars, flows, and block mappings.
    category: protocol
    source_template: yaml_lite
    topics: [yaml, parser, config]

  - name: ltl-smtp-client
    tagline: SMTP client with STARTTLS, AUTH PLAIN/LOGIN, and attachments.
    category: protocol
    source_template: smtp_client
    topics: [smtp, email, networking]

  - name: ltl-mqtt-client
    tagline: MQTT 3.1.1 client — QoS 0/1/2, retained messages, reconnect.
    category: protocol
    source_template: mqtt_client
    topics: [mqtt, iot, networking]

  - name: ltl-sip-parser
    tagline: SIP (RFC 3261) message parser with SDP body awareness.
    category: protocol
    source_template: sip_parser
    topics: [sip, voip, parser]

  # -- Games / terminal toys -------------------------------------------------

  - name: ltl-minesweeper
    tagline: Terminal minesweeper with solver and 3BV scoring.
    category: game
    source_template: minesweeper
    topics: [game, terminal, minesweeper]

  - name: ltl-snake
    tagline: Terminal snake with auto-pilot AI (BFS pathfinder).
    category: game
    source_template: snake
    topics: [game, terminal, snake]

  - name: ltl-life
    tagline: Conway's Game of Life — infinite plane via hashlife.
    category: game
    source_template: life
    topics: [cellular-automata, life]

  - name: ltl-rogue
    tagline: Tiny roguelike — procedurally generated dungeons, FOV, A* pathing.
    category: game
    source_template: rogue
    topics: [game, terminal, roguelike]

  # -- Mini compilers / VMs --------------------------------------------------

  - name: ltl-brainfuck
    tagline: Brainfuck interpreter + template JIT to x86-64.
    category: compiler
    source_template: brainfuck
    topics: [compiler, jit, esoteric]

  - name: ltl-forth
    tagline: Small Forth-like concatenative language with threaded code.
    category: compiler
    source_template: forth
    topics: [forth, interpreter, concatenative]

  - name: ltl-regex-vm
    tagline: Thompson NFA regex engine — no backtracking, linear-time.
    category: compiler
    source_template: regex_vm
    topics: [regex, compiler, strings]

  # -- Project templates ------------------------------------------------------

  - name: lateralus-cli-template
    tagline: "Starter template: `lateralus new cli` — argparse, logging, tests."
    category: template
    source_template: cli_template
    topics: [template, cli, starter]

  - name: lateralus-lib-template
    tagline: "Starter template: `lateralus new lib` — public API, docs, CI."
    category: template
    source_template: lib_template
    topics: [template, library, starter]

  - name: lateralus-wasm-template
    tagline: "Starter template: `lateralus new wasm` — browser + WASI targets."
    category: template
    source_template: wasm_template
    topics: [template, webassembly, starter]
