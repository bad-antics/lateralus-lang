name: lateralus
base: core22
version: '3.2.0'
summary: Lateralus programming language toolchain
description: |
  Lateralus is a systems programming language with first-class support for
  cryptographic primitives, LSP integration, and a self-hosting OS target.
  This snap installs the compiler (`ltlc`), the language server
  (`lateralus-lsp`), and the formatter.

grade: stable
confinement: classic
license: MIT

apps:
  lateralus:
    command: bin/lateralus
  ltlc:
    command: bin/ltlc
  lateralus-lsp:
    command: bin/lateralus-lsp

parts:
  lateralus-lang:
    plugin: python
    source: https://files.pythonhosted.org/packages/source/l/lateralus-lang/lateralus_lang-3.2.0.tar.gz
    python-packages:
      - lateralus-lang==3.2.0
