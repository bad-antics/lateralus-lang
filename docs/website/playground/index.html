    let name = "World"

pipeline: `// Pipeline Operator \u2014 Lateralus's signature feature
// Chain functions left-to-right with |>

import std::io
import std::collections

struct Transaction {
    category: String,
    amount: Float,
    description: String,
}

fn main() {
    let transactions = [
        Transaction { category: "food",   amount: 42.50, description: "Groceries" },
        Transaction { category: "tech",   amount: 199.99, description: "Keyboard" },
        Transaction { category: "food",   amount: 18.75, description: "Lunch" },
        Transaction { category: "tech",   amount: 29.99, description: "USB Hub" },
        Transaction { category: "books",  amount: 14.99, description: "Rust Book" },
        Transaction { category: "food",   amount: 55.00, description: "Dinner" },
        Transaction { category: "tech",   amount: 549.00, description: "Monitor" },
    ]

    let report = transactions
        |> filter(|t| t.amount > 20.0)
        |> group_by(|t| t.category)
        |> map_entries(|cat, txns| {
            let total = txns |> map(|t| t.amount) |> sum()
            let count = txns |> len()
            (cat, total, count)
        })
        |> sort_by(|entry| entry.1, descending)

    println("=== Spending Report (> $20) ===")
    for (category, total, count) in report {
        println("  {category}: \${total:.2} ({count} transactions)")
    }

    let avg = transactions
        |> map(|t| t.amount)
        |> average()

    println("\\nAverage transaction: \${avg:.2}")
}`,

pattern: `// Pattern Matching \u2014 exhaustive and expressive

import std::io
import std::math

enum Shape {
    Circle(Float),
    Rect(Float, Float),
    Triangle(Float, Float),
    Polygon(Vec<(Float, Float)>),
}

fn area(shape: Shape) -> Float {
    match shape {
        Circle(r)       => math::pi * r * r,
        Rect(w, h)      => w * h,
        Triangle(b, h)  => 0.5 * b * h,
        Polygon(points) => polygon_area(points),
    }
}

fn describe(shape: Shape) -> String {
    match shape {
        Circle(r) if r > 100.0  => "Large circle (r={r})",
        Circle(r)               => "Circle (r={r})",
        Rect(w, h) if w == h    => "Square ({w}x{h})",
        Rect(w, h)              => "Rectangle ({w}x{h})",
        Triangle(b, h)          => "Triangle (base={b}, h={h})",
        Polygon(pts)            => "Polygon ({pts |> len()} sides)",
    }
}

fn polygon_area(points: Vec<(Float, Float)>) -> Float {
    let n = points |> len()
    (0..n)
        |> map(|i| {
            let (x1, y1) = points[i]
            let (x2, y2) = points[(i + 1) % n]
            x1 * y2 - x2 * y1
        })
        |> sum()
        |> abs()
        |> div(2.0)
}

fn main() {
    let shapes = [
        Circle(5.0),
        Rect(10.0, 10.0),
        Rect(3.0, 7.0),
        Triangle(8.0, 4.0),
        Circle(150.0),
    ]

    for shape in shapes {
        let desc = describe(shape)
        let a = area(shape)
        println("{desc} => area = {a:.2}")
    }
}`,

async: `// Async / Concurrency \u2014 lightweight tasks with spawn

import std::io
import std::net::http
import std::time

async fn fetch_data(url: String) -> Result<String, Error> {
    println("  Fetching {url}...")
    let resp = http::get(url) |> await?
    println("  Got {resp.status} from {url} ({resp.body |> len()} bytes)")
    Ok(resp.body)
}

async fn process_batch(urls: [String]) -> [Result<String, Error>] {
    let tasks = urls
        |> map(|url| spawn { fetch_data(url) |> await })

    let results = tasks |> await_all()

    let successes = results |> filter(|r| r.is_ok()) |> len()
    println("\\nCompleted: {successes}/{results |> len()} succeeded")

    results
}

fn main() {
    let urls = [
        "https://api.github.com/repos/bad-antics/lateralus-lang",
        "https://httpbin.org/get",
        "https://httpbin.org/delay/1",
        "https://jsonplaceholder.typicode.com/posts/1",
    ]

    println("=== Concurrent HTTP Fetcher ===\\n")

    let start = time::now()
    let results = process_batch(urls) |> await
    let elapsed = time::since(start)

    println("\\nTotal time: {elapsed.as_millis()}ms")
    println("(Sequential would be ~4x slower)")
}`,

struct: `// Structs, Impl Blocks & Traits

import std::io

struct Vec2 {
    x: Float,
    y: Float,
}

impl Vec2 {
    fn new(x: Float, y: Float) -> Vec2 {
        Vec2 { x, y }
    }

    fn magnitude(self) -> Float {
        (self.x * self.x + self.y * self.y) |> sqrt()
    }

    fn normalize(self) -> Vec2 {
        let mag = self.magnitude()
        Vec2 { x: self.x / mag, y: self.y / mag }
    }

    fn dot(self, other: Vec2) -> Float {
        self.x * other.x + self.y * other.y
    }

    fn add(self, other: Vec2) -> Vec2 {
        Vec2 { x: self.x + other.x, y: self.y + other.y }
    }

    fn scale(self, factor: Float) -> Vec2 {
        Vec2 { x: self.x * factor, y: self.y * factor }
    }

    fn to_string(self) -> String {
        "({self.x:.2}, {self.y:.2})"
    }
}

fn main() {
    let a = Vec2::new(3.0, 4.0)
    let b = Vec2::new(1.0, 2.0)

    println("a = {a.to_string()}")
    println("b = {b.to_string()}")
    println("|a| = {a.magnitude():.2}")
    println("a normalized = {a.normalize().to_string()}")
    println("a \u00b7 b = {a.dot(b):.2}")

    let sum = a.add(b)
    println("a + b = {sum.to_string()}")

    // Pipeline with methods
    let result = Vec2::new(10.0, 0.0)
        |> scale(0.5)
        |> add(Vec2::new(0.0, 3.0))
        |> normalize()

    println("\\nPipelined result: {result.to_string()}")
}`,

functional: `// Functional Pipelines \u2014 data transformation made beautiful

import std::io
import std::collections

fn main() {
    let words = [
        "spiral", "beyond", "reaching", "over",
        "the", "lateralus", "pattern", "a",
        "fibonacci", "in", "sequence", "hidden",
    ]

    let result = words
        |> filter(|w| w |> len() > 2)
        |> map(|w| w |> capitalize())
        |> enumerate()
        |> map(|(i, w)| "{i + 1}. {w}")
        |> join("\\n")

    println("=== Words (3+ letters, capitalized) ===")
    println(result)

    let fibs = (0..15)
        |> map(fib)
        |> collect()

    println("\\n=== Fibonacci ===")
    println(fibs |> map(to_string) |> join(", "))

    let numbers = [2, 7, 11, 15, 3, 6, 8, 1]
    let target = 9
    let pairs = find_pairs(numbers, target)
    println("\\n=== Pairs summing to {target} ===")
    for (a, b) in pairs {
        println("  {a} + {b} = {target}")
    }
}

fn fib(n: Int) -> Int {
    match n {
        0 => 0,
        1 => 1,
        n => fib(n - 1) + fib(n - 2),
    }
}

fn find_pairs(nums: [Int], target: Int) -> [(Int, Int)] {
    nums
        |> enumerate()
        |> flat_map(|(i, a)| {
            nums[i+1..]
                |> filter(|b| a + b == target)
                |> map(|b| (a, b))
        })
        |> collect()
}`,

import std::io
import std::fs

enum AppError {
    NotFound(String),
    ParseError(String, Int),
    Overflow(String),
}

fn parse_config(path: String) -> Result<Config, AppError> {
    let content = fs::read_to_string(path)
        |> map_err(|_| AppError::NotFound("Config not found: {path}"))?

    let lines = content |> split("\\n") |> enumerate()

    let mut config = Config::default()

    for (line_num, line) in lines {
        let line = line |> trim()
        if line |> is_empty() || line |> starts_with("#") {
            continue
        }

        let parts = line |> split("=") |> map(trim) |> collect()
        if parts |> len() != 2 {
            return Err(AppError::ParseError(line, line_num + 1))
        }

        match parts[0] {
            "port"     => config.port = parts[1] |> parse_int()?,
            "host"     => config.host = parts[1],
            "workers"  => config.workers = parts[1] |> parse_int()?,
            unknown    => println("  warn: unknown key '{unknown}'"),
        }
    }

    Ok(config)
}

struct Config {
    host: String,
    port: Int,
    workers: Int,
}

impl Config {
    fn default() -> Config {
        Config { host: "localhost", port: 8080, workers: 4 }
    }
}

fn main() {
    println("=== Config Loader ===\\n")

    try {
        let config = parse_config("server.conf")?
        println("Loaded: {config.host}:{config.port}")
        println("Workers: {config.workers}")
    } recover err {
        match err {
            AppError::NotFound(msg)      => println("Error: {msg}"),
            AppError::ParseError(ln, n)  => println("Parse error at line {n}: {ln}"),
            AppError::Overflow(msg)      => println("Overflow: {msg}"),
        }
    } ensure {
        println("\\nConfig loading complete.")
    }
}`,

import std::io
import std::net::http
import std::json

struct User {
    id: Int,
    name: String,
    email: String,
}

// In-memory store
let mut users: Vec<User> = []
let mut next_id: Int = 1

fn home_handler(req: Request) -> Response {
    Response::html("<h1>Lateralus API Server</h1>
        <p>Try: GET /api/users, POST /api/users</p>")
}

fn list_users(req: Request) -> Response {
    users
        |> map(|u| json::object({
            "id": u.id,
            "name": u.name,
            "email": u.email,
        }))
        |> json::array()
        |> Response::json()
}

fn create_user(req: Request) -> Response {
    let body = req.body |> json::parse()

    let user = User {
        id: next_id,
        name: body["name"] |> to_string(),
        email: body["email"] |> to_string(),
    }
    next_id += 1
    users |> push(user)

    println("Created user: {user.name} ({user.email})")

    Response::json(json::object({ "ok": true, "id": user.id }))
        |> with_status(201)
}

fn not_found(req: Request) -> Response {
    Response::json(json::object({ "error": "not found" }))
        |> with_status(404)
}

fn main() {
    let app = Router::new()
        |> get("/",           home_handler)
        |> get("/api/users",  list_users)
        |> post("/api/users", create_user)
        |> fallback(not_found)

    println("Server listening on http://0.0.0.0:8080")
    http::serve("0.0.0.0:8080", app) |> await
}`,

generics: `// Generics \u2014 type-safe polymorphism with constraints

import std::io
import std::collections

fn max_of<T: Ord>(items: Vec<T>) -> Option<T> {
    items
        |> reduce(|a, b| if a > b { a } else { b })
}

struct Stack<T> {
    items: Vec<T>,
}

impl<T> Stack<T> {
    fn new() -> Stack<T> {
        Stack { items: [] }
    }

    fn push(self, item: T) -> Stack<T> {
        self.items |> append(item)
        self
    }

    fn pop(self) -> (Option<T>, Stack<T>) {
        match self.items |> last() {
            Some(item) => {
                self.items |> drop_last()
                (Some(item), self)
            },
            None => (None, self),
        }
    }

    fn peek(self) -> Option<T> {
        self.items |> last()
    }

    fn size(self) -> Int {
        self.items |> len()
    }
}

struct Pair<A, B> {
    first: A,
    second: B,
}

impl<A, B> Pair<A, B> {
    fn map_first<C>(self, f: fn(A) -> C) -> Pair<C, B> {
        Pair { first: f(self.first), second: self.second }
    }
}

fn main() {
    let nums = [42, 17, 99, 3, 55]
    println("Max of {nums}: {max_of(nums)}")

    let words = ["apple", "mango", "banana"]
    println("Max of words: {max_of(words)}")

    let stack = Stack::new()
        |> push(10)
        |> push(20)
        |> push(30)

    println("Stack size: {stack.size()}")
    println("Top: {stack.peek()}")

    let (val, stack) = stack.pop()
    println("Popped: {val}")
    println("New top: {stack.peek()}")

    let pair = Pair { first: 42, second: "hello" }
    let doubled = pair.map_first(|n| n * 2)
    println("Pair: ({doubled.first}, {doubled.second})")
}`,

import std::io

fn compose<A, B, C>(f: fn(A) -> B, g: fn(B) -> C) -> fn(A) -> C {
    |x| g(f(x))
}

fn apply_n<T>(f: fn(T) -> T, n: Int, value: T) -> T {
    (0..n) |> fold(value, |acc, _| f(acc))
}

fn main() {
    let double = |x| x * 2
    let add_one = |x| x + 1

    println("double(5) = {double(5)}")
    println("add_one(5) = {add_one(5)}")

    let double_then_add = compose(double, add_one)
    println("double_then_add(5) = {double_then_add(5)}")

    let multiplier = 3
    let times_n = |x| x * multiplier
    println("times_n(7) = {times_n(7)}")

    let threshold = 15
    let result = [3, 8, 12, 25, 7, 19, 4, 30]
        |> filter(|x| x > threshold)

    let triple = |x| x * 3
    println("triple applied 4 times to 1: {apply_n(triple, 4, 1)}")

    let adders = [1, 5, 10]
        |> map(|n| |x| x + n)

    for adder in adders {

    }
}`,

import std::io
import std::collections::HashMap
import math::{sqrt, pow, pi}
import utils::validation

module geometry {
    pub struct Point {
        x: Float,
        y: Float,
    }

    pub fn distance(a: Point, b: Point) -> Float {
        let dx = b.x - a.x
        let dy = b.y - a.y
        sqrt(dx * dx + dy * dy)
    }

    pub fn midpoint(a: Point, b: Point) -> Point {
        Point {
            x: (a.x + b.x) / 2.0,
            y: (a.y + b.y) / 2.0,
        }
    }

    fn normalize(p: Point) -> Point {
        let mag = sqrt(p.x * p.x + p.y * p.y)
        Point { x: p.x / mag, y: p.y / mag }
    }

    pub fn unit_vector(from: Point, to: Point) -> Point {
        let dx = to.x - from.x
        let dy = to.y - from.y
        normalize(Point { x: dx, y: dy })
    }
}

module colors {
    pub enum Color {
        Red, Green, Blue,
        RGB(Int, Int, Int),
        Hex(String),
    }

    pub fn to_hex(c: Color) -> String {
        match c {
            Red          => "#FF0000",
            Green        => "#00FF00",
            Blue         => "#0000FF",
            RGB(r, g, b) => format("#{r:02x}{g:02x}{b:02x}"),
            Hex(s)       => s,
        }
    }
}

    let a = geometry::Point { x: 0.0, y: 0.0 }
    let b = geometry::Point { x: 3.0, y: 4.0 }

    let dist = geometry::distance(a, b)
    let mid = geometry::midpoint(a, b)

        colors::Hex("#22d3ee"),

}`,

import std::io

fn fibonacci() -> Iterator<Int> {
    let a = 0
    let b = 1
    iter::generate(|| {
        let current = a
        let next = a + b
        a = b
        b = next
        current
    })
}

fn countdown(from: Int) -> Iterator<Int> {
    iter::range(from, 0, -1)
}

fn windows<T>(items: Iterator<T>, size: Int) -> Iterator<Vec<T>> {
    items |> iter::buffer(size, 1)
}

        |> take(10)

    let fib_primes = fibonacci()
        |> filter(is_prime)
        |> take(7)
        |> collect()

    let launch = countdown(5)
        |> map(|n| if n == 0 { "Liftoff!" } else { "{n}..." })
        |> collect()

fn parse_args(args: Vec<String>) -> Config {
    let app = App::new("ltl-analyze")
        |> App::version("1.0.0")
        |> App::description("Lateralus source code analyzer")
        |> App::arg(Arg::flag("verbose", "v", "Show detailed output"))
        |> App::arg(Arg::option("output", "o", "Output file", "report.txt"))
        |> App::arg(Arg::option("format", "f", "Output format", "text"))

    app |> App::parse(args)
        |> match {
            Ok(matches) => Config {
                verbose: matches |> has_flag("verbose"),
                output: matches |> get_option("output"),
                format: matches |> get_option("format"),
            },
            Err(e) => {
                println("Error: {e}")
                app |> App::print_help()
                exit(1)
            },
        }
}

fn analyze_file(path: String, verbose: Bool) -> Analysis {
    let source = fs::read_to_string(path)
    let lines = source |> lines()

    let stats = lines
        |> fold(Stats::new(), |stats, line| {
            stats
                |> count_line(line)
                |> detect_function(line)
                |> detect_pipeline(line)
                |> detect_pattern_match(line)
        })

    if verbose {
        println("  {path}:")

        println("    Functions: {stats.functions}")
        println("    Pipelines: {stats.pipelines}")
        println("    Pattern matches: {stats.matches}")

gameloop: `// Game Loop \u2014 entity-component system with pipelines

import std::io
import std::math

struct Vec2 {
    x: Float,
    y: Float,
}

impl Vec2 {
    fn add(self, other: Vec2) -> Vec2 {
        Vec2 { x: self.x + other.x, y: self.y + other.y }
    }
    fn scale(self, s: Float) -> Vec2 {
        Vec2 { x: self.x * s, y: self.y * s }
    }
    fn magnitude(self) -> Float {
        math::sqrt(self.x * self.x + self.y * self.y)
    }
}

enum EntityKind {
    Player,
    Enemy(String),
    Projectile,
}

struct Entity {
    kind: EntityKind,
    pos: Vec2,
    vel: Vec2,
    hp: Int,
    active: Bool,
}

fn update_physics(entities: Vec<Entity>, dt: Float) -> Vec<Entity> {
    entities
        |> filter(|e| e.active)
        |> map(|e| Entity {
            pos: e.pos.add(e.vel.scale(dt)),
            ..e
        })
}

fn check_collisions(entities: Vec<Entity>) -> Vec<Entity> {
    entities |> map(|e| {
        match e.kind {
            Projectile => {
                let hit = entities
                    |> filter(|other| match other.kind {
                        Enemy(_) => true, _ => false
                    })
                    |> find(|enemy| distance(e.pos, enemy.pos) < 1.5)

                match hit {
                    Some(enemy) => Entity { active: false, ..e },
                    None => e,
                }
            },
            _ => e,
        }
    })
}

fn render(entities: Vec<Entity>) {
    entities
        |> filter(|e| e.active)
        |> sort_by(|e| e.pos.y)
        |> each(|e| {
            let label = match e.kind {
                Player       => "\u{1F3AE} Player",
                Enemy(name)  => "\u{1F47E} {name}",
                Projectile   => "\u{1F4AB} Bullet",
            }
            println("  {label} at ({e.pos.x:.1}, {e.pos.y:.1}) HP:{e.hp}")
        })
}

fn main() {
    let entities = [
        Entity { kind: Player, pos: Vec2{x:0.0,y:0.0}, vel: Vec2{x:1.0,y:0.5}, hp: 100, active: true },
        Entity { kind: Enemy("Drone"), pos: Vec2{x:10.0,y:5.0}, vel: Vec2{x:-0.5,y:0.0}, hp: 30, active: true },
        Entity { kind: Enemy("Boss"), pos: Vec2{x:20.0,y:8.0}, vel: Vec2{x:0.0,y:-0.2}, hp: 200, active: true },
        Entity { kind: Projectile, pos: Vec2{x:1.0,y:0.5}, vel: Vec2{x:5.0,y:2.0}, hp: 1, active: true },
    ]

    println("=== Game State ===")
    let state = entities
    for frame in 0..3 {
        println("\\n--- Frame {frame} ---")
        state = state
            |> update_physics(0.16)
            |> check_collisions()
        render(state)
    }

    let alive = state |> filter(|e| e.active) |> len()
    println("\\nActive entities: {alive}/{entities |> len()}")
}`,

// New in Lateralus v0.5.0

import std::io
import std::sync::{channel, select}
import std::time

struct SensorReading {
    sensor_id: String,
    value: Float,
    timestamp: Int,
}

async fn temperature_sensor(tx: Sender<SensorReading>) {
    for i in 0..5 {
        time::sleep(100) |> await
        let reading = SensorReading {
            sensor_id: "temp-01",
            value: 20.0 + (i as Float * 0.5),
            timestamp: time::now_ms(),
        }
        tx |> send(reading) |> await
    }
    tx |> close()
}

async fn pressure_sensor(tx: Sender<SensorReading>) {
    for i in 0..3 {
        time::sleep(150) |> await
        let reading = SensorReading {
            sensor_id: "pres-01",
            value: 1013.25 + (i as Float * 2.0),
            timestamp: time::now_ms(),
        }
        tx |> send(reading) |> await
    }
    tx |> close()
}

async fn monitor(temp_rx: Receiver<SensorReading>, pres_rx: Receiver<SensorReading>) {
    let mut count = 0
    loop {
        select {
            reading from temp_rx => {
                println("  [TEMP] {reading.sensor_id}: {reading.value:.1}\u00b0C")
                count += 1
            },
            reading from pres_rx => {
                println("  [PRES] {reading.sensor_id}: {reading.value:.2} hPa")
                count += 1
            },
            closed => {
                println("\\nAll sensors closed. Total readings: {count}")
                break
            },
        }
    }
}

fn main() {
    let (temp_tx, temp_rx) = channel::<SensorReading>(8)
    let (pres_tx, pres_rx) = channel::<SensorReading>(8)

    println("=== Sensor Monitor (Channels + Select) ===\\n")

    spawn { temperature_sensor(temp_tx) |> await }
    spawn { pressure_sensor(pres_tx) |> await }
    monitor(temp_rx, pres_rx) |> await
}`,

// New in Lateralus v0.5.0

import std::io
import std::collections::HashMap

// Declarative macro for quick struct builders
macro define_builder($name:ident, $($field:ident : $type:ty),*) {
    struct $name {
        $($field: Option<$type>,)*
    }

    impl $name {
        fn new() -> $name {
            $name { $($field: None,)* }
        }

        $(fn $field(self, val: $type) -> $name {
            $name { $field: Some(val), ..self }
        })*

        fn build(self) -> Result<$name, String> {
            $(if self.$field.is_none() {
                return Err("Missing field: " + stringify!($field))
            })*
            Ok(self)
        }
    }
}

// Use the macro
define_builder!(UserBuilder, name: String, age: Int, email: String)

// Procedural macro for auto-serialization
macro derive_json($struct_name:ident) {
    impl $struct_name {
        fn to_json(self) -> String {
            let fields = struct_fields!(self)
                |> map(|(name, val)| "\\\"{name}\\\": {json_value(val)}")
                |> join(", ")
            "{ " + fields + " }"
        }
    }
}

// Macro for pipeline operators
macro pipe_debug($expr:expr) {
    {
        let __val = $expr
        println("  [debug] {stringify!($expr)} = {__val}")
        __val
    }
}

fn main() {
    println("=== Macro System ===\\n")

    // Builder pattern via macro
    let user = UserBuilder::new()
        |> name("Alice")
        |> age(30)
        |> email("wizard@lateralus.dev")
        |> build()

    match user {
        Ok(u) => println("Built user: {u.name} (age {u.age})"),
        Err(e) => println("Error: {e}"),
    }

    // Debug pipeline macro

    let result = [1, 2, 3, 4, 5]

        |> pipe_debug!(map(|x| x * 10))

effects: `// Effect System — algebraic effects and handlers
// New in Lateralus v0.5.0

import std::io
import std::collections

// Define effects as first-class constructs
effect Log {
    fn log(level: String, message: String) -> ()
}

effect State<T> {
    fn get() -> T
    fn put(value: T) -> ()
}

effect Fail {
    fn fail(reason: String) -> Never
}

// A function that uses effects (declared in signature)
fn process_items(items: [String]) -> [String] with Log, State<Int>, Fail {
    let mut results = []

    for item in items {
        let count = perform State::get()

        if item |> is_empty() {
            perform Log::log("warn", "Empty item at index {count}")
            perform Fail::fail("Empty item encountered")
        }

        let processed = item
            |> trim()
            |> to_uppercase()

        perform Log::log("info", "Processed: {processed}")
        perform State::put(count + 1)
        results |> push(processed)
    }

    results
}

fn main() {
    println("=== Effect System ===\\n")

    let items = ["hello", "  world  ", "lateralus", "", "effects"]

    // Handle effects at the call site
    let result = handle {
        process_items(items)
    } with {
        Log::log(level, msg) => {
            let prefix = match level {
                "info" => "\u2705",
                "warn" => "\u26a0\ufe0f",
                "error" => "\u274c",
                _ => "\u2022",
            }
            println("  {prefix} [{level}] {msg}")
            resume(())
        },
        State::get() => resume(0) with State<Int>,
        State::put(n) => resume(()) with State<Int>,
        Fail::fail(reason) => {
            println("  \u274c [fail] {reason} — skipping")
            resume(())
        },
    }

    println("\\nResult: {result}")
    println("Processed {result |> len()} items")
}`,

// New in Lateralus v0.5.0

import std::io

// Compile-time function evaluation
const fn factorial(n: Int) -> Int {
    match n {
        0 | 1 => 1,
        n     => n * factorial(n - 1),
    }
}

// Computed at compile time, zero runtime cost
const FACT_10: Int = factorial(10)
const FACT_20: Int = factorial(20)

// Compile-time type-level programming
const fn type_name<T>() -> String {
    comptime {
        match T {
            Int    => "integer",
            Float  => "float",
            String => "string",
            Bool   => "boolean",
            Vec<_> => "vector",
            _      => "unknown",
        }
    }
}

// Compile-time lookup tables
const LUT: [Int; 256] = comptime {
    let mut table = [0; 256]
    for i in 0..256 {
        table[i] = (i * 17 + 31) % 256
    }
    table
}

// Static assertions
static_assert!(FACT_10 == 3628800, "factorial(10) should be 3628800")
static_assert!(LUT[0] == 31, "LUT[0] should be 31")

// Conditional compilation
const fn platform_config() -> Config {
    comptime {
        match target::os() {
            "linux"   => Config { threads: 8, allocator: "jemalloc" },
            "macos"   => Config { threads: 8, allocator: "mimalloc" },
            "windows" => Config { threads: 4, allocator: "system" },
            _         => Config { threads: 2, allocator: "system" },
        }
    }
}

// Compile-time string processing
const GREETING: String = comptime {
    let parts = ["Lateralus", "v0.5.0", "Comptime"]
    parts |> join(" | ")
}

    println("=== Compile-Time Evaluation ===\\n")

    println("factorial(10) = {FACT_10}")
    println("factorial(20) = {FACT_20}")

    println("\\nType names (resolved at compile time):")
    println("  Int    -> {type_name::<Int>()}")
    println("  Float  -> {type_name::<Float>()}")
    println("  String -> {type_name::<String>()}")

// -- UI Logic -------------------------------------------------

const editor = document.getElementById('editor');
const output = document.getElementById('output');
const lineNumbers = document.getElementById('lineNumbers');

function updateLineNumbers() {
    const lineCount = editor.value.split('\n').length;
    lineNumbers.textContent = Array.from({ length: lineCount }, function(_, i) { return i + 1; }).join('\n');
}

function updateStatus() {
    const text = editor.value;
    const pos = editor.selectionStart;
    const before = text.substring(0, pos);
    const line = before.split('\n').length;
    const col = pos - before.lastIndexOf('\n');
    document.getElementById('statusLines').textContent = 'Ln ' + line + ', Col ' + col;
    document.getElementById('statusChars').textContent = text.length + ' chars';
}

function escHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

editor.addEventListener('input', function() { updateLineNumbers(); updateStatus(); });
editor.addEventListener('click', updateStatus);
editor.addEventListener('keyup', updateStatus);
editor.addEventListener('scroll', function() { lineNumbers.scrollTop = editor.scrollTop; });

// Tab key inserts spaces
editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
        e.preventDefault();
        var start = editor.selectionStart;
        var end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 4;
        updateLineNumbers();
    }
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        runCode();
    }
});

function renderOutput(linesArr, lineCount, elapsed, offline) {
    var html = '<span class="sep">----------------------------------------</span>\n';
    html += '<span class="info">  Compiled main.ltl (' + lineCount + ' lines)' + (offline ? ' [offline]' : '') + '</span>\n';
    html += '<span class="sep">----------------------------------------</span>\n\n';

    linesArr.forEach(function(line) {
        if (line.type) {
            html += '<span class="' + line.type + '">' + escHtml(line.text) + '</span>\n';
        } else {
            html += escHtml(line.text) + '\n';
        }
    });

    html += '\n<span class="sep">----------------------------------------</span>\n';
    html += '<span class="info">  Process exited (' + elapsed + 'ms) -- 0 errors, 0 warnings</span>\n';
    return html;
}

async function runCode() {
    var code = editor.value;
    if (!code.trim()) {
        output.innerHTML = '<span class="warn">No code to run.</span>';
        return;
    }

    output.innerHTML = '<span class="info">Compiling...</span>';
    var lineCount = code.split('\n').length;

    // Try API first, fall back to simulation
    try {
        var controller = new AbortController();
        var fetchTimeout = setTimeout(function() { controller.abort(); }, 8000);

        var resp = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code }),
            signal: controller.signal,
        });

        clearTimeout(fetchTimeout);

        if (!resp.ok && resp.status !== 200) {
            throw new Error('API returned status ' + resp.status);
        }

        var data;
        try {
            data = await resp.json();
        } catch (jsonErr) {
            throw new Error('Non-JSON response from API');
        }

        // API returned valid JSON
        var html = '<span class="sep">----------------------------------------</span>\n';
        html += '<span class="info">  Compiled main.ltl (' + lineCount + ' lines)</span>\n';
        html += '<span class="sep">----------------------------------------</span>\n\n';

        if (data.success && Array.isArray(data.output)) {
            data.output.forEach(function(line) {
                html += escHtml(String(line)) + '\n';
            });
            html += '\n<span class="sep">----------------------------------------</span>\n';
            html += '<span class="info">  Process exited (' + (data.stats ? data.stats.elapsed_ms : '?') + 'ms, ' + (data.stats ? data.stats.steps : '?') + ' steps) -- 0 errors, 0 warnings</span>\n';
        } else if (data.error) {
            // Try simulation fallback for known example patterns
            try {
                var simResult = simulateRun(code);
                if (simResult.matched) {
                    output.innerHTML = renderOutput(simResult.lines, lineCount, simResult.elapsed, false);
                    return;
                }
            } catch(simErr) {}
            var errMsg = typeof data.error === 'string' ? data.error : (data.error.message || 'Unknown error');
            html += '<span class="error">' + escHtml(errMsg) + '</span>\n';
            html += '\n<span class="sep">----------------------------------------</span>\n';
            html += '<span class="error">  Compilation failed (' + (data.stats ? data.stats.elapsed_ms : 0) + 'ms)</span>\n';
        } else {
            html += '<span class="info">(program compiled successfully -- no output)</span>\n';
            html += '\n<span class="sep">----------------------------------------</span>\n';
            html += '<span class="info">  Process exited (0ms) -- 0 errors, 0 warnings</span>\n';
        }

        output.innerHTML = html;
    } catch (fetchErr) {
        // Fallback to client-side simulation
        try {
            var result = simulateRun(code);
            output.innerHTML = renderOutput(result.lines, lineCount, result.elapsed, true);
        } catch (simErr) {
            output.innerHTML = '<span class="error">Error: ' + escHtml(String(fetchErr.message || fetchErr)) + '</span>';
        }
    }
}

function loadExample(name) {
    if (!name || !EXAMPLES[name]) return;
    editor.value = EXAMPLES[name];
    updateLineNumbers();
    updateStatus();
    output.innerHTML = '<span class="info">Example loaded -- press <span class="accent">&#9654; Run</span> to execute.</span>';
    document.getElementById('exampleSelect').value = '';
}

function shareCode() {
    var code = editor.value;
    var encoded = btoa(unescape(encodeURIComponent(code)));
    var url = window.location.origin + window.location.pathname + '#code=' + encoded;
    document.getElementById('shareUrl').value = url;
    document.getElementById('shareModal').classList.add('active');
}

function copyShare() {
    var input = document.getElementById('shareUrl');
    input.select();
    navigator.clipboard.writeText(input.value).then(function() {
        var btn = document.querySelector('.modal .btn');
        var orig = btn.textContent;
        btn.textContent = '\u2713 Copied!';
        setTimeout(function() { btn.textContent = orig; }, 1500);
    });
}

function formatCode() {
    var code = editor.value;
    var codeLines = code.split('\n');
    var indent = 0;
    var formatted = codeLines.map(function(line) {
        var trimmed = line.trim();
        if (trimmed.startsWith('}') || trimmed.startsWith(']') || trimmed.startsWith(')')) {
            indent = Math.max(0, indent - 1);
        }
        var result = '    '.repeat(indent) + trimmed;
        if (trimmed.endsWith('{') || trimmed.endsWith('[') || trimmed.endsWith('(')) {
            indent++;
        }
        return result;
    }).join('\n');
    editor.value = formatted;
    updateLineNumbers();
    updateStatus();
}

// -- Init -----------------------------------------------------

// Load from URL hash if present
var hash = window.location.hash;
if (hash.startsWith('#code=')) {
    try {
        editor.value = decodeURIComponent(escape(atob(hash.slice(6))));
    } catch (e) {
        editor.value = EXAMPLES.hello;
    }
} else {
    editor.value = EXAMPLES.hello;
}

updateLineNumbers();
updateStatus();

// Event listeners (CSP-compliant)
document.getElementById('exampleSelect').addEventListener('change', function() { loadExample(this.value); });
document.getElementById('runBtn').addEventListener('click', runCode);
document.getElementById('formatBtn').addEventListener('click', formatCode);
document.getElementById('shareBtn').addEventListener('click', shareCode);
document.getElementById('copyShareBtn').addEventListener('click', copyShare);
document.getElementById('shareUrl').addEventListener('click', function() { this.select(); });
document.getElementById('closeModalBtn').addEventListener('click', function() { document.getElementById('shareModal').classList.remove('active'); });
document.querySelector('.hamburger').addEventListener('click', function() { this.classList.toggle('open'); document.querySelector('.topbar-links').classList.toggle('show'); });
</script>
